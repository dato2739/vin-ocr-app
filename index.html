<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIN OCR & Decoder</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
body { font-family: Arial; padding:20px; background:#f5f5f5;}
.box { background:white; padding:20px; border-radius:10px; margin-bottom:20px;}
img { max-width:100%; border-radius:10px;}
button { padding:10px; margin-top:10px;}
</style>
</head>
<body>

<div class="box">
<h2>Upload VIN Image</h2>
<input type="file" id="file">
<br>
<button onclick="process()">Recognize VIN</button>
</div>

<div class="box">
<h3>Preview</h3>
<img id="preview"/>
</div>

<div class="box">
<h3>Result</h3>
<input id="vin" style="width:300px;" placeholder="VIN will appear here"/>
</div>

<script>
function enhance(canvas, ctx){
  let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = imgData.data;
  for(let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    let val = avg>140?255:avg<80?0:avg;
    d[i]=d[i+1]=d[i+2]=val;
  }
  ctx.putImageData(imgData,0,0);
}

async function process(){
  const file = document.getElementById('file').files[0];
  if(!file) return;

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = async ()=>{
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width*2;
    canvas.height = img.height*2;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    enhance(canvas, ctx);

    document.getElementById("preview").src = canvas.toDataURL();

    const { data } = await Tesseract.recognize(canvas.toDataURL(),"eng");

    let text = data.text.toUpperCase().replace(/[^A-Z0-9]/g,"");
    let vin = text.match(/[A-HJ-NPR-Z0-9]{17}/);

    document.getElementById("vin").value = vin ? vin[0] : "NOT FOUND";
  }
}
</script>

</body>
</html>
